AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Pixel Prompt v2 - Focused 4-model image generation with iterative refinement

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Environment Configuration"
        Parameters:
          - Environment
      - Label:
          default: "Gemini Configuration (Google)"
        Parameters:
          - GeminiEnabled
          - GeminiApiKey
          - GeminiModelId
      - Label:
          default: "Nova Canvas Configuration (AWS Bedrock)"
        Parameters:
          - NovaEnabled
          - NovaModelId
      - Label:
          default: "OpenAI (DALL-E 3) Configuration"
        Parameters:
          - OpenaiEnabled
          - OpenaiApiKey
          - OpenaiModelId
      - Label:
          default: "Adobe Firefly Configuration"
        Parameters:
          - FireflyEnabled
          - FireflyClientId
          - FireflyClientSecret
          - FireflyModelId
      - Label:
          default: "Prompt Enhancement"
        Parameters:
          - PromptModelProvider
          - PromptModelId
          - PromptModelApiKey
      - Label:
          default: "Per-Model Daily Caps"
        Parameters:
          - ModelGeminiDailyCap
          - ModelNovaDailyCap
          - ModelOpenaiDailyCap
          - ModelFireflyDailyCap
      - Label:
          default: "CAPTCHA (Cloudflare Turnstile)"
        Parameters:
          - CaptchaEnabled
          - TurnstileSecretKey
      - Label:
          default: "Email Notifications (SES)"
        Parameters:
          - SesEnabled
          - SesFromEmail
          - SesRegion
      - Label:
          default: "Admin Dashboard"
        Parameters:
          - AdminEnabled
      - Label:
          default: "CORS"
        Parameters:
          - CorsAllowedOrigin
      - Label:
          default: "Tier System (DynamoDB)"
        Parameters:
          - UsersTableName
      - Label:
          default: "Cognito (Auth)"
        Parameters:
          - CognitoDomainPrefix
          - CognitoCallbackUrl
          - CognitoLogoutUrl

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name for resource tagging

  # Gemini Configuration
  GeminiEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Google Gemini model

  GeminiApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Google Gemini API key

  GeminiModelId:
    Type: String
    Default: "gemini-3.1-flash-image-preview"
    Description: Gemini model ID for image generation

  # Nova Canvas (AWS Bedrock) Configuration
  NovaEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Amazon Nova Canvas via Bedrock

  NovaModelId:
    Type: String
    Default: "amazon.nova-canvas-v1:0"
    Description: Nova Canvas Bedrock model identifier

  # OpenAI (DALL-E 3) Configuration
  OpenaiEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable OpenAI DALL-E 3 model

  OpenaiApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: OpenAI API key

  OpenaiModelId:
    Type: String
    Default: "dall-e-3"
    Description: OpenAI image generation model ID

  # Adobe Firefly Configuration
  FireflyEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Adobe Firefly model

  FireflyClientId:
    Type: String
    NoEcho: true
    Default: ""
    Description: Adobe Firefly OAuth2 client ID

  FireflyClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Adobe Firefly OAuth2 client secret

  FireflyModelId:
    Type: String
    Default: "firefly-image-5"
    Description: Adobe Firefly model ID

  # Prompt Enhancement Model
  PromptModelProvider:
    Type: String
    Default: "openai"
    AllowedValues:
      - openai
      - google_gemini
    Description: Provider for prompt enhancement (text/chat model)

  PromptModelId:
    Type: String
    Default: "gpt-4o"
    Description: Model ID for prompt enhancement

  PromptModelApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: API key for prompt enhancement model

  # CORS
  CorsAllowedOrigin:
    Type: String
    Default: "http://localhost:5173"
    Description: Allowed CORS origin -- must be an exact URL (not *) because credentials (cookies) are required. Set to your frontend domain in production.

  # Tier System
  UsersTableName:
    Type: String
    Default: "pixel-prompt-users"
    Description: DynamoDB table name for tier and quota state

  # Cognito
  CognitoDomainPrefix:
    Type: String
    Default: ""
    Description: Cognito Hosted UI domain prefix (must be globally unique within region)

  CognitoCallbackUrl:
    Type: String
    Default: "http://localhost:5173/auth/callback"
    Description: OAuth2 callback URL for Cognito Hosted UI

  CognitoLogoutUrl:
    Type: String
    Default: "http://localhost:5173/"
    Description: OAuth2 logout redirect URL for Cognito Hosted UI

  # Feature Flags
  AuthEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Cognito auth and tier-based quotas

  BillingEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Stripe billing (requires AuthEnabled=true)

  GuestTokenSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: HMAC secret for signing guest cookies (required when AuthEnabled=true)

  # Tier Limits
  GuestGenerateLimit:
    Type: Number
    Default: 1
    Description: Generations per guest per window

  GuestWindowSeconds:
    Type: Number
    Default: 3600
    Description: Guest rolling window length in seconds

  GuestGlobalLimit:
    Type: Number
    Default: 5
    Description: Global guest generation cap per window

  GuestGlobalWindowSeconds:
    Type: Number
    Default: 3600
    Description: Global guest window length in seconds

  FreeGenerateLimit:
    Type: Number
    Default: 1
    Description: Generations per free user per window

  FreeRefineLimit:
    Type: Number
    Default: 2
    Description: Refinements per free user per window

  FreeWindowSeconds:
    Type: Number
    Default: 3600
    Description: Free tier rolling window length in seconds

  PaidDailyLimit:
    Type: Number
    Default: 200
    Description: Refinements per paid user per day

  PaidWindowSeconds:
    Type: Number
    Default: 86400
    Description: Paid tier rolling window length in seconds

  # Stripe
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe API secret key (required when BillingEnabled=true)

  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe webhook signing secret (required when BillingEnabled=true)

  StripePriceId:
    Type: String
    Default: ""
    Description: Stripe Price ID for the paid subscription

  StripeSuccessUrl:
    Type: String
    Default: "http://localhost:5173/billing/success"
    Description: Redirect URL after successful Stripe checkout

  StripeCancelUrl:
    Type: String
    Default: "http://localhost:5173/billing/cancel"
    Description: Redirect URL after cancelled Stripe checkout

  StripePortalReturnUrl:
    Type: String
    Default: "http://localhost:5173/"
    Description: Return URL from Stripe Customer Portal

  # Per-Model Daily Caps
  ModelGeminiDailyCap:
    Type: Number
    Default: 500
    Description: Daily generation cap for Gemini model

  ModelNovaDailyCap:
    Type: Number
    Default: 500
    Description: Daily generation cap for Nova Canvas model

  ModelOpenaiDailyCap:
    Type: Number
    Default: 500
    Description: Daily generation cap for OpenAI model

  ModelFireflyDailyCap:
    Type: Number
    Default: 500
    Description: Daily generation cap for Firefly model

  # CAPTCHA
  CaptchaEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Cloudflare Turnstile CAPTCHA for guest /generate

  TurnstileSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Cloudflare Turnstile secret key (required when CaptchaEnabled=true)

  # SES Email Notifications
  SesEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable Amazon SES email notifications

  SesFromEmail:
    Type: String
    Default: ""
    Description: Verified SES sender email address (required when SesEnabled=true)

  SesRegion:
    Type: String
    Default: "us-west-2"
    Description: AWS region for SES

  # Admin
  AdminEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable admin dashboard and API (requires AuthEnabled=true)


Conditions:
  AuthEnabledCondition: !Equals [!Ref AuthEnabled, "true"]


Globals:
  Function:
    Tags:
      Project: PixelPromptV2
      Environment: !Ref Environment
      ManagedBy: SAM

Resources:
  PixelPromptFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-function'
      Runtime: python3.13
      Handler: lambda_function.lambda_handler
      CodeUri: ./src
      MemorySize: 3008
      Timeout: 900
      ReservedConcurrentExecutions: 10
      Environment:
        Variables:
          # Model Configuration
          GEMINI_ENABLED: !Ref GeminiEnabled
          GEMINI_API_KEY: !Ref GeminiApiKey
          GEMINI_MODEL_ID: !Ref GeminiModelId
          NOVA_ENABLED: !Ref NovaEnabled
          NOVA_MODEL_ID: !Ref NovaModelId
          OPENAI_ENABLED: !Ref OpenaiEnabled
          OPENAI_API_KEY: !Ref OpenaiApiKey
          OPENAI_MODEL_ID: !Ref OpenaiModelId
          FIREFLY_ENABLED: !Ref FireflyEnabled
          FIREFLY_CLIENT_ID: !Ref FireflyClientId
          FIREFLY_CLIENT_SECRET: !Ref FireflyClientSecret
          FIREFLY_MODEL_ID: !Ref FireflyModelId
          # Prompt Enhancement
          PROMPT_MODEL_PROVIDER: !Ref PromptModelProvider
          PROMPT_MODEL_ID: !Ref PromptModelId
          PROMPT_MODEL_API_KEY: !Ref PromptModelApiKey
          # CORS
          CORS_ALLOWED_ORIGIN: !Ref CorsAllowedOrigin
          # S3 and CloudFront
          S3_BUCKET: !Ref PixelPromptBucket
          CLOUDFRONT_DOMAIN: !GetAtt CloudFrontDistribution.DomainName
          # Tier system
          AUTH_ENABLED: !Ref AuthEnabled
          BILLING_ENABLED: !Ref BillingEnabled
          GUEST_TOKEN_SECRET: !Ref GuestTokenSecret
          USERS_TABLE_NAME: !Ref UsersTable
          COGNITO_USER_POOL_ID: !If [AuthEnabledCondition, !Ref UserPool, ""]
          COGNITO_USER_POOL_CLIENT_ID: !If [AuthEnabledCondition, !Ref UserPoolClient, ""]
          COGNITO_DOMAIN: !If [AuthEnabledCondition, !Sub "https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com", ""]
          COGNITO_REGION: !Ref AWS::Region
          # Guest limits
          GUEST_GENERATE_LIMIT: !Ref GuestGenerateLimit
          GUEST_WINDOW_SECONDS: !Ref GuestWindowSeconds
          GUEST_GLOBAL_LIMIT: !Ref GuestGlobalLimit
          GUEST_GLOBAL_WINDOW_SECONDS: !Ref GuestGlobalWindowSeconds
          # Free tier limits
          FREE_GENERATE_LIMIT: !Ref FreeGenerateLimit
          FREE_REFINE_LIMIT: !Ref FreeRefineLimit
          FREE_WINDOW_SECONDS: !Ref FreeWindowSeconds
          # Paid tier limits
          PAID_DAILY_LIMIT: !Ref PaidDailyLimit
          PAID_WINDOW_SECONDS: !Ref PaidWindowSeconds
          # Stripe
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          STRIPE_PRICE_ID: !Ref StripePriceId
          STRIPE_SUCCESS_URL: !Ref StripeSuccessUrl
          STRIPE_CANCEL_URL: !Ref StripeCancelUrl
          STRIPE_PORTAL_RETURN_URL: !Ref StripePortalReturnUrl
          # Per-model daily caps
          MODEL_GEMINI_DAILY_CAP: !Ref ModelGeminiDailyCap
          MODEL_NOVA_DAILY_CAP: !Ref ModelNovaDailyCap
          MODEL_OPENAI_DAILY_CAP: !Ref ModelOpenaiDailyCap
          MODEL_FIREFLY_DAILY_CAP: !Ref ModelFireflyDailyCap
          # CAPTCHA
          CAPTCHA_ENABLED: !Ref CaptchaEnabled
          TURNSTILE_SECRET_KEY: !Ref TurnstileSecretKey
          # SES
          SES_ENABLED: !Ref SesEnabled
          SES_FROM_EMAIL: !Ref SesFromEmail
          SES_REGION: !Ref SesRegion
          # Admin
          ADMIN_ENABLED: !Ref AdminEnabled
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - Version: '2012-10-17'
          Statement:
            - Sid: S3ReadWriteImages
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource:
                - !Sub '${PixelPromptBucket.Arn}/sessions/*'
                - !Sub '${PixelPromptBucket.Arn}/rate-limit/*'
            - Sid: S3ListBucket
              Effect: Allow
              Action: s3:ListBucket
              Resource: !GetAtt PixelPromptBucket.Arn
              Condition:
                StringLike:
                  s3:prefix:
                    - 'sessions/*'
            - Sid: BedrockInvokeModel
              Effect: Allow
              Action: bedrock:InvokeModel
              Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/*'
            - Sid: CloudWatchPutMetrics
              Effect: Allow
              Action: cloudwatch:PutMetricData
              Resource: "*"
      Events:
        GenerateApi:
          Type: HttpApi
          Properties:
            Path: /generate
            Method: POST
            ApiId: !Ref HttpApi
        IterateApi:
          Type: HttpApi
          Properties:
            Path: /iterate
            Method: POST
            ApiId: !Ref HttpApi
            Auth: !If
              - AuthEnabledCondition
              - Authorizer: CognitoJwt
              - {}
        OutpaintApi:
          Type: HttpApi
          Properties:
            Path: /outpaint
            Method: POST
            ApiId: !Ref HttpApi
            Auth: !If
              - AuthEnabledCondition
              - Authorizer: CognitoJwt
              - {}
        GetMe:
          Type: HttpApi
          Properties:
            Path: /me
            Method: GET
            ApiId: !Ref HttpApi
            Auth: !If
              - AuthEnabledCondition
              - Authorizer: CognitoJwt
              - {}
        PostBillingCheckout:
          Type: HttpApi
          Properties:
            Path: /billing/checkout
            Method: POST
            ApiId: !Ref HttpApi
            Auth: !If
              - AuthEnabledCondition
              - Authorizer: CognitoJwt
              - {}
        PostBillingPortal:
          Type: HttpApi
          Properties:
            Path: /billing/portal
            Method: POST
            ApiId: !Ref HttpApi
            Auth: !If
              - AuthEnabledCondition
              - Authorizer: CognitoJwt
              - {}
        PostStripeWebhook:
          Type: HttpApi
          Properties:
            Path: /stripe/webhook
            Method: POST
            ApiId: !Ref HttpApi
        StatusApi:
          Type: HttpApi
          Properties:
            Path: /status/{sessionId}
            Method: GET
            ApiId: !Ref HttpApi
        EnhanceApi:
          Type: HttpApi
          Properties:
            Path: /enhance
            Method: POST
            ApiId: !Ref HttpApi
        LogApi:
          Type: HttpApi
          Properties:
            Path: /log
            Method: POST
            ApiId: !Ref HttpApi
        GalleryListApi:
          Type: HttpApi
          Properties:
            Path: /gallery/list
            Method: GET
            ApiId: !Ref HttpApi
        GalleryDetailApi:
          Type: HttpApi
          Properties:
            Path: /gallery/{sessionId}
            Method: GET
            ApiId: !Ref HttpApi
        DailySnapshotSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 0 * * ? *)
            Description: Daily operational metrics snapshot
            Enabled: true
            Input: '{"source": "scheduled", "action": "daily_snapshot"}'

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: Prod
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsAllowedOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
          - X-Correlation-ID
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 86400
        AllowCredentials: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
      Auth: !If
        - AuthEnabledCondition
        - Authorizers:
            CognitoJwt:
              JwtConfiguration:
                issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
                audience:
                  - !Ref UserPoolClient
              IdentitySource: "$request.header.Authorization"
        - {}

  UserPool:
    Type: AWS::Cognito::UserPool
    Condition: AuthEnabledCondition
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: AuthEnabledCondition
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub "${AWS::StackName}-web"
      GenerateSecret: false
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs: [!Ref CognitoCallbackUrl]
      LogoutURLs: [!Ref CognitoLogoutUrl]
      SupportedIdentityProviders: [COGNITO]

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Condition: AuthEnabledCondition
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  AdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Condition: AuthEnabledCondition
    Properties:
      GroupName: admins
      UserPoolId: !Ref UserPool
      Description: Administrators with access to /admin endpoints

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref UsersTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  PixelPromptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'pixel-prompt-v2-${Environment}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedHeaders:
              - '*'
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldSessions
            Status: Enabled
            ExpirationInDays: 30
            Prefix: sessions/
    DeletionPolicy: Retain

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub 'OAI for ${AWS::StackName}'

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PixelPromptBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAI
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub '${PixelPromptBucket.Arn}/*'

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'CloudFront for ${AWS::StackName}'
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt PixelPromptBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
          DefaultTTL: 86400
          MaxTTL: 31536000
        PriceClass: PriceClass_100

  FunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${PixelPromptFunction}'
      RetentionInDays: 7

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-lambda-errors'
      AlarmDescription: Alert on Lambda function errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref PixelPromptFunction
      TreatMissingData: notBreaching

Outputs:
  FunctionName:
    Description: Lambda Function Name
    Value: !Ref PixelPromptFunction

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'

  CloudFrontDomain:
    Description: CloudFront distribution domain
    Value: !GetAtt CloudFrontDistribution.DomainName

  S3BucketName:
    Description: S3 bucket name
    Value: !Ref PixelPromptBucket

  UsersTableName:
    Description: DynamoDB users table name
    Value: !Ref UsersTable

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient

  UserPoolDomain:
    Description: Cognito User Pool Hosted UI domain prefix
    Value: !Ref CognitoDomainPrefix
