name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'tests/backend/**'

  frontend:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run --coverage

  backend:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    env:
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: test-bucket
      PYTHONPATH: ${{ github.workspace }}/backend/src
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/src/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/src/requirements.txt
          pip install pytest pytest-mock pytest-cov requests-mock moto ruff
      - name: Lint
        run: ruff check backend/src/
      - name: Tests
        run: pytest tests/backend/unit -v --tb=short --cov=backend/src --cov-report=term-missing --cov-fail-under=60

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, backend]
    if: needs.changes.outputs.backend == 'true'
    env:
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: test-bucket
      PYTHONPATH: ${{ github.workspace }}/backend/src
      LOCALSTACK_ENDPOINT: http://localhost:4566
    services:
      localstack:
        image: localstack/localstack:4
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/src/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/src/requirements.txt
          pip install pytest pytest-mock requests-mock moto requests
      - name: Run E2E tests
        run: pytest tests/backend/e2e -v -m e2e

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend, backend, e2e]
    if: always()
    steps:
      - name: Verify
        run: |
          results=(
            "${{ needs.frontend.result }}"
            "${{ needs.backend.result }}"
            "${{ needs.e2e.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more checks failed: $result"
              exit 1
            fi
          done
          echo "All checks passed!"
