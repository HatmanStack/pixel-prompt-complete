name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'tests/backend/**'

  frontend:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npx vitest run --coverage

  backend:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    env:
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: test-bucket
      PYTHONPATH: ${{ github.workspace }}/backend/src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Install dependencies
        run: |
          uv pip install --system -r backend/src/requirements.txt
          uv pip install --system -e "backend/.[dev]"
      - name: Lint
        run: ruff check backend/src/
      - name: Tests
        run: pytest tests/backend/unit -v --tb=short --cov=backend/src --cov-report=term-missing --cov-fail-under=80

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, backend]
    if: needs.changes.outputs.backend == 'true'
    env:
      AWS_DEFAULT_REGION: us-east-1
      S3_BUCKET: test-bucket
      PYTHONPATH: ${{ github.workspace }}/backend/src
      MINISTACK_ENDPOINT: http://localhost:4566
    services:
      ministack:
        image: nahuelnucera/ministack
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
        # No --health-cmd: ministack image has no curl/wget (uvicorn entrypoint only).
        # Health is polled from the runner host below instead.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Install dependencies
        run: |
          uv pip install --system -r backend/src/requirements.txt
          uv pip install --system -e "backend/.[dev]"
      - name: Wait for ministack
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:4566/_ministack/health >/dev/null; then
              echo "ministack ready"
              exit 0
            fi
            sleep 2
          done
          echo "ministack failed to become healthy" >&2
          exit 1
      - name: Run E2E tests
        run: pytest tests/backend/e2e -v -m e2e

  docs:
    name: Documentation Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
      - name: Markdownlint
        run: npx -y markdownlint-cli2 "**/*.md" "#node_modules" "#.claude" "#frontend/node_modules" "#docs/plans" "#.venv"

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [frontend, backend, e2e, docs]
    if: always()
    steps:
      - name: Verify
        run: |
          results=(
            "${{ needs.frontend.result }}"
            "${{ needs.backend.result }}"
            "${{ needs.e2e.result }}"
            "${{ needs.docs.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more checks failed: $result"
              exit 1
            fi
          done
          echo "All checks passed!"
